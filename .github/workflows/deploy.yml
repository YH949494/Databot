name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Compile check
        run: python -m compileall -q app

      - name: Run tests if present
        run: |
          if [ -d tests ] && [ "$(find tests -name 'test_*.py' -o -name '*_test.py' | wc -l)" -gt 0 ]; then
            pytest -q
          else
            echo "No tests found; skipping pytest."
          fi

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: ci-gate
    timeout-minutes: 20
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}   # add this
      TG_GROWTH_BOT_TOKEN: ${{ secrets.TG_GROWTH_BOT_TOKEN }}
      TG_REPORT_CHAT_ID: ${{ secrets.TG_REPORT_CHAT_ID }}
      TG_ADMIN_USER_IDS: ${{ secrets.TG_ADMIN_USER_IDS }}
      TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Push runtime secrets to Fly
        run: |
          if [ -n "${FLY_APP_NAME}" ]; then
            APP_ARGS=(--app "${FLY_APP_NAME}")
          else
            APP_ARGS=()
          fi

          flyctl secrets set "${APP_ARGS[@]}" \
            MONGODB_URI="${MONGODB_URI}" \
            TG_GROWTH_BOT_TOKEN="${TG_GROWTH_BOT_TOKEN}" \
            TG_REPORT_CHAT_ID="${TG_REPORT_CHAT_ID}" \
            TG_ADMIN_USER_IDS="${TG_ADMIN_USER_IDS}" \
            TG_CHANNEL_ID="${TG_CHANNEL_ID}"

      - name: Deploy
        run: |
          if [ -n "${FLY_APP_NAME}" ]; then
            flyctl deploy --remote-only --app "${FLY_APP_NAME}"
          else
            flyctl deploy --remote-only
          fi
