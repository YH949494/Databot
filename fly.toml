app = "databot"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  TZ = "Asia/Kuala_Lumpur"
  SCHEDULER_ENABLED = "true"
  SCHEDULE_DAILY_CRON = "30 00 * * *"
  SCHEDULE_WEEKLY_CRON = "20 0 * * 1"
  DASHBOARD_URL = "https://databot.fly.dev"

[processes]
  app = "python -m app.main --mode scheduler"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
