app = "databot"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  TZ = "Asia/Kuala_Lumpur"
  SCHEDULER_ENABLED = "true"
  SCHEDULE_DAILY_CRON = "30 00 * * *"
  SCHEDULE_WEEKLY_CRON = "20 0 * * 1"

[processes]
  app = "python -m app.main --mode scheduler"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
